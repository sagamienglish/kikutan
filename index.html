<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>キクタンbasic 単語アプリ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    /* ◎◯△×ボタンの選択状態の色 */
    .status-btn.selected-double-circle { background-color: #8b5cf6; color: white; border-color: #8b5cf6; } /* Purple */
    .status-btn.selected-circle { background-color: #3b82f6; color: white; border-color: #3b82f6; } /* Blue */
    .status-btn.selected-triangle { background-color: #eab308; color: white; border-color: #eab308; } /* Yellow */
    .status-btn.selected-cross { background-color: #ef4444; color: white; border-color: #ef4444; } /* Red */
    
    /* カスタムスクロールバー */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    
    /* 1行リストのレイアウト用 */
    .list-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.75rem 0.5rem;
      border-bottom: 1px solid #e2e8f0;
      background-color: white;
    }
  </style>
</head>
<body class="bg-slate-100 flex justify-center min-h-screen font-sans text-slate-800">

  <!-- アプリのメインコンテナ -->
  <div class="bg-white w-full max-w-md shadow-xl flex flex-col relative h-[100dvh] sm:h-auto sm:min-h-[700px] sm:my-8 sm:rounded-2xl overflow-hidden">
    
    <!-- ローディング表示 -->
    <div id="loading-screen" class="absolute inset-0 bg-white z-50 flex flex-col items-center justify-center">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mb-4"></div>
      <p class="text-slate-500 font-bold">単語データを読み込み中...</p>
    </div>

    <!-- 画面1: ホーム（Part一覧）画面 -->
    <div id="home-screen" class="screen hidden flex flex-col h-full fade-in">
      <div class="bg-blue-600 text-white p-4 shadow-md z-10">
        <h1 class="text-xl font-bold text-center">キクタンbasic</h1>
        <p class="text-center text-blue-200 text-sm mt-1">学習したいPartを選んでください</p>
      </div>
      <div id="part-list" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50">
        <!-- PartリストがここにJSで生成されます -->
      </div>
    </div>

    <!-- 画面2: リスト（単語一覧）画面 -->
    <div id="list-screen" class="screen hidden flex flex-col h-full fade-in relative">
      <div class="bg-blue-600 text-white p-4 flex items-center justify-between shadow-md z-10">
        <button onclick="showScreen('home-screen')" class="p-2 hover:bg-blue-700 rounded-lg transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
        </button>
        <h2 id="list-title" class="text-lg font-bold">Part X</h2>
        <div class="w-10"></div>
      </div>
      
      <!-- ボタンエリア -->
      <div class="p-3 bg-white border-b border-slate-200 grid grid-cols-2 gap-2 shadow-sm z-10">
        <button id="start-quiz-btn" onclick="openQuizTargetModal()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-2 rounded-lg shadow text-sm transition-colors flex items-center justify-center gap-1">
          ✍️ 練習メニュー
        </button>
        <button onclick="startVsMode()" class="bg-purple-500 hover:bg-purple-600 text-white font-bold py-2 px-2 rounded-lg shadow text-sm transition-colors flex items-center justify-center gap-1">
          ⚔️ 対戦 (5問)
        </button>
      </div>

      <div id="word-list" class="flex-1 overflow-y-auto bg-slate-50 pb-20">
        <!-- 1行の単語リストがここにJSで生成されます -->
      </div>
    </div>

    <!-- 画面3: クイズ（練習問題）画面 -->
    <div id="quiz-screen" class="screen hidden flex flex-col h-full fade-in bg-slate-50">
      <div class="p-4 flex items-center justify-between z-10">
        <button onclick="endQuiz()" class="text-slate-500 hover:bg-slate-200 p-2 rounded-lg font-bold text-sm transition-colors">中断</button>
        <div id="quiz-progress" class="text-slate-500 font-bold bg-white px-4 py-1 rounded-full shadow-sm text-sm">1 / 10</div>
        <button onclick="replayAudio()" class="text-blue-500 hover:bg-blue-100 p-2 rounded-lg transition-colors" title="音声をもう一度聞く">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
        </button>
      </div>

      <div class="flex-1 flex flex-col justify-center items-center p-6 mb-8">
        <div id="quiz-word" class="text-5xl font-extrabold text-slate-800 mb-8 text-center tracking-wide">word</div>
        <div id="quiz-options" class="w-full space-y-3">
          <!-- 選択肢がここにJSで生成されます -->
        </div>
      </div>
      
      <!-- クイズ結果のフィードバック -->
      <div id="quiz-feedback" class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-0 transition-opacity duration-300 z-50">
        <div id="feedback-icon" class="text-9xl font-bold drop-shadow-lg"></div>
      </div>
    </div>

    <!-- 画面4: 対戦モード (VS画面) -->
    <div id="vs-screen" class="screen hidden absolute inset-0 bg-slate-900 z-50 flex flex-col fade-in overflow-hidden">
      <!-- Player 2 (上側・180度回転) -->
      <div class="flex-1 bg-red-50 relative flex flex-col items-center justify-center p-4 rotate-180">
        <div class="absolute top-4 left-4 font-bold text-red-800 text-lg">P2 Score: <span id="p2-score">0</span></div>
        <div id="p2-options" class="grid grid-cols-2 gap-3 w-full max-w-sm"></div>
      </div>
      
      <!-- 中央セパレーター -->
      <div class="h-14 bg-slate-800 flex items-center justify-between px-4 relative z-10 border-y-4 border-slate-900">
        <button onclick="endVsMode()" class="text-xs text-white bg-slate-600 px-3 py-1 rounded">終了</button>
        <button onclick="replayAudio()" class="bg-blue-500 text-white rounded-full p-3 shadow-lg absolute left-1/2 transform -translate-x-1/2 -translate-y-1/2 top-1/2 active:scale-95 transition-transform">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
        </button>
        <div class="text-xs text-white font-bold">VS MODE</div>
      </div>

      <!-- Player 1 (下側・通常) -->
      <div class="flex-1 bg-blue-50 relative flex flex-col items-center justify-center p-4">
        <div class="absolute top-4 left-4 font-bold text-blue-800 text-lg">P1 Score: <span id="p1-score">0</span></div>
        <div id="p1-options" class="grid grid-cols-2 gap-3 w-full max-w-sm"></div>
      </div>
    </div>

    <!-- モーダル1: 練習対象選択 -->
    <div id="quiz-target-modal" class="hidden absolute inset-0 bg-slate-900/60 z-50 flex items-center justify-center fade-in px-4">
      <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm">
        <h3 class="text-lg font-bold mb-4 text-center text-slate-700">練習する対象を選択</h3>
        <div class="space-y-3">
          <button id="btn-target-tx" onclick="startQuiz(['triangle', 'cross'])" class="w-full py-3 bg-red-50 text-red-700 border border-red-200 rounded-xl font-bold hover:bg-red-100 transition-colors">△ と ×</button>
          <button id="btn-target-ctx" onclick="startQuiz(['circle', 'triangle', 'cross'])" class="w-full py-3 bg-blue-50 text-blue-700 border border-blue-200 rounded-xl font-bold hover:bg-blue-100 transition-colors">◯ と △ と ×</button>
          <button id="btn-target-all" onclick="startQuiz(['double-circle', 'circle', 'triangle', 'cross', 'none'])" class="w-full py-3 bg-purple-50 text-purple-700 border border-purple-200 rounded-xl font-bold hover:bg-purple-100 transition-colors">すべて</button>
        </div>
        <button onclick="closeQuizTargetModal()" class="mt-4 w-full py-3 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200 transition-colors">キャンセル</button>
      </div>
    </div>

    <!-- モーダル2: 単語詳細ポップアップ (スマホでの確認用) -->
    <div id="word-detail-modal" class="hidden absolute inset-0 bg-slate-900/60 z-50 flex items-center justify-center fade-in px-4" onclick="closeWordDetailModal(event)">
      <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-xs text-center relative" onclick="event.stopPropagation()">
        <button onclick="closeWordDetailModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 bg-slate-100 rounded-full p-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
        <button onclick="replayAudio()" class="mx-auto bg-blue-100 text-blue-500 rounded-full p-5 mb-6 hover:bg-blue-200 transition-transform active:scale-95">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
        </button>
        <div id="detail-word" class="text-4xl font-extrabold text-slate-800 mb-4 tracking-wide">word</div>
        <div id="detail-meaning" class="text-xl font-bold text-slate-600">意味</div>
      </div>
    </div>

  </div>

  <script>
    // ==========================================
    // GASのURL
    // ==========================================
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbz9w9cL2jmyHwWk-rHO080nb2fV11_FH_iCCv8BuM_0GPu2sfgBldIzW4GBOHWdHnBU/exec';

    const WORDS_PER_PART = 100;
    const QUIZ_COUNT = 10;
    
    let globalWords = []; 
    let currentPartIndex = 0; 
    let quizQueue = []; 
    let currentQuizIndex = 0; 
    let currentSpeakingWord = "";
    let quizWrongCount = 0; // その問題での間違い回数

    // ローカルストレージのキー
    const STORAGE_KEY = 'kikutan_progress_v2';

    // 音声読み上げ機能
    function speakWord(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
        currentSpeakingWord = text;
      }
    }

    function replayAudio() {
      if(currentSpeakingWord) speakWord(currentSpeakingWord);
    }

    // アプリ初期化
    async function initApp() {
      try {
        const response = await fetch(GAS_URL);
        const rawData = await response.json();
        const data = rawData.filter(item => item && item.word && item.word.toString().trim() !== '');
        
        if (data.length < 100) {
           const dummyData = Array.from({length: 1200}, (_, i) => ({
             word: data[i % data.length]?.word + `_${i+1}` || `word_${i+1}`,
             meaning: data[i % data.length]?.meaning + `_${i+1}` || `意味_${i+1}`
           }));
           globalWords = dummyData;
        } else {
           globalWords = data;
        }
        
        renderHome();
        document.getElementById('loading-screen').classList.add('hidden');
        showScreen('home-screen');
      } catch (error) {
        console.error("データの読み込みに失敗しました:", error);
        document.getElementById('loading-screen').innerHTML = `
          <div class="text-red-500 font-bold mb-2">読み込みエラー</div>
          <p class="text-slate-500 text-sm text-center px-4">通信環境やGASのURLを確認してください。</p>
        `;
      }
    }

    // --- データ管理ロジック ---
    function loadProgress() {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : {};
    }

    function saveProgress(word, status) {
      const progress = loadProgress();
      progress[word] = status; 
      if (status === 'none') delete progress[word];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
    }

    function getWordsForPart(partIndex) {
      const start = partIndex * WORDS_PER_PART;
      return globalWords.slice(start, start + WORDS_PER_PART);
    }

    // --- モーダル制御 ---
    function openQuizTargetModal() {
      const partWords = getWordsForPart(currentPartIndex);
      const progressData = loadProgress();
      
      let countTx = 0; // △, ×
      let countCtx = 0; // ◯, △, ×
      let countAll = partWords.length;
      
      partWords.forEach(w => {
        const st = progressData[w.word] || 'none';
        if (st === 'triangle' || st === 'cross') countTx++;
        if (st === 'circle' || st === 'triangle' || st === 'cross') countCtx++;
      });
      
      document.getElementById('btn-target-tx').textContent = `△ と × (${countTx}語)`;
      document.getElementById('btn-target-ctx').textContent = `◯ と △ と × (${countCtx}語)`;
      document.getElementById('btn-target-all').textContent = `すべて (${countAll}語)`;
      
      document.getElementById('btn-target-tx').disabled = (countTx === 0);
      document.getElementById('btn-target-ctx').disabled = (countCtx === 0);
      
      document.querySelectorAll('#quiz-target-modal button[id^="btn-target-"]').forEach(btn => {
         if(btn.disabled) {
            btn.classList.add('opacity-50', 'cursor-not-allowed');
         } else {
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
         }
      });

      document.getElementById('quiz-target-modal').classList.remove('hidden');
    }
    
    function closeQuizTargetModal() {
      document.getElementById('quiz-target-modal').classList.add('hidden');
    }

    function openWordDetail(word, meaning) {
      currentSpeakingWord = word;
      document.getElementById('detail-word').textContent = word;
      document.getElementById('detail-meaning').textContent = meaning;
      document.getElementById('word-detail-modal').classList.remove('hidden');
      speakWord(word); // ポップアップが開いたら発音
    }

    function closeWordDetailModal(e) {
      if (e) e.stopPropagation();
      document.getElementById('word-detail-modal').classList.add('hidden');
    }

    // --- 画面レンダリング ---
    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
      document.getElementById(screenId).classList.remove('hidden');
      if (screenId === 'home-screen') renderHome();
    }

    // ホーム画面（Part一覧）
    function renderHome() {
      const listContainer = document.getElementById('part-list');
      listContainer.innerHTML = '';
      const progressData = loadProgress();
      const totalParts = Math.ceil(globalWords.length / WORDS_PER_PART);

      for (let i = 0; i < totalParts; i++) {
        const partWords = getWordsForPart(i);
        if (partWords.length === 0) continue;

        let learnedCount = 0;
        partWords.forEach(w => {
          if (progressData[w.word] === 'circle' || progressData[w.word] === 'double-circle') learnedCount++;
        });
        const percentage = Math.round((learnedCount / partWords.length) * 100);

        const startNum = i * WORDS_PER_PART + 1;
        const endNum = startNum + partWords.length - 1;

        const btn = document.createElement('button');
        btn.className = "w-full bg-white p-4 rounded-xl shadow-sm border border-slate-200 hover:border-blue-400 transition-all flex items-center justify-between group";
        btn.onclick = () => openPartList(i);

        btn.innerHTML = `
          <div class="text-left">
            <h3 class="font-bold text-slate-700 text-lg group-hover:text-blue-600">Part ${i + 1}</h3>
            <p class="text-xs text-slate-400 mt-1">No. ${startNum} - ${endNum}</p>
          </div>
          <div class="flex items-center gap-3">
            <div class="text-right">
              <div class="text-sm font-bold ${percentage === 100 ? 'text-purple-500' : 'text-blue-500'}">${percentage}%</div>
              <div class="text-[10px] text-slate-400">覚えた!</div>
            </div>
          </div>
        `;
        listContainer.appendChild(btn);
      }
    }

    function openPartList(partIndex) {
      currentPartIndex = partIndex;
      document.getElementById('list-title').textContent = `Part ${partIndex + 1}`;
      renderWordList();
      showScreen('list-screen');
    }

    // 単語リスト画面
    function renderWordList() {
      const container = document.getElementById('word-list');
      container.innerHTML = '';
      const partWords = getWordsForPart(currentPartIndex);
      const progressData = loadProgress();

      partWords.forEach((wordObj, index) => {
        const currentStatus = progressData[wordObj.word] || 'none';
        const globalIndex = currentPartIndex * WORDS_PER_PART + index + 1;
        const escapedWord = wordObj.word.replace(/'/g, "\\'");
        const escapedMeaning = wordObj.meaning.replace(/'/g, "\\'");
        
        const row = document.createElement('div');
        row.className = "list-row hover:bg-blue-50 transition-colors";
        
        const createBtn = (mark, statusVal, colorClass, selectedClass) => {
          const isSelected = currentStatus === statusVal;
          const baseClass = "status-btn w-7 h-7 flex items-center justify-center rounded border font-bold text-xs transition-colors shrink-0";
          const classes = isSelected ? `${baseClass} ${selectedClass}` : `${baseClass} border-slate-200 ${colorClass}`;
          return `<button onclick="updateStatus('${escapedWord}', '${statusVal}')" class="${classes}">${mark}</button>`;
        };

        // 単語部分をクリッカブルにしてポップアップを呼び出す
        row.innerHTML = `
          <div class="flex items-center gap-2 overflow-hidden flex-1 pl-1 cursor-pointer group" onclick="openWordDetail('${escapedWord}', '${escapedMeaning}')">
            <span class="text-[10px] text-slate-400 w-5 shrink-0 text-right">${globalIndex}</span>
            <button onclick="event.stopPropagation(); speakWord('${escapedWord}')" class="text-blue-500 hover:text-blue-700 bg-blue-100 rounded-full w-6 h-6 flex items-center justify-center shrink-0 transition-transform active:scale-90">🔊</button>
            <span class="font-bold text-slate-800 text-sm sm:text-base shrink-0 group-hover:text-blue-600 transition-colors">${wordObj.word}</span>
            <span class="text-xs text-slate-500 truncate ml-1">${wordObj.meaning}</span>
          </div>
          <div class="flex gap-1 shrink-0 pr-1">
            ${createBtn('◎', 'double-circle', 'text-purple-500 hover:bg-purple-50', 'selected-double-circle')}
            ${createBtn('◯', 'circle', 'text-blue-500 hover:bg-blue-50', 'selected-circle')}
            ${createBtn('△', 'triangle', 'text-yellow-500 hover:bg-yellow-50', 'selected-triangle')}
            ${createBtn('×', 'cross', 'text-red-500 hover:bg-red-50', 'selected-cross')}
          </div>
        `;
        container.appendChild(row);
      });
    }

    function updateStatus(word, newStatus) {
      const progress = loadProgress();
      const current = progress[word] || 'none';
      const finalStatus = current === newStatus ? 'none' : newStatus;
      saveProgress(word, finalStatus);
      renderWordList();
    }

    // --- クイズ（練習問題）ロジック ---
    function startQuiz(targetStatuses) {
      closeQuizTargetModal();
      const partWords = getWordsForPart(currentPartIndex);
      const progressData = loadProgress();
      
      let targets = partWords.filter(w => {
        const status = progressData[w.word] || 'none';
        return targetStatuses.includes(status);
      });

      if (targets.length === 0) return;

      targets.sort(() => Math.random() - 0.5);
      quizQueue = targets.slice(0, Math.min(QUIZ_COUNT, targets.length));
      currentQuizIndex = 0;

      showScreen('quiz-screen');
      renderQuiz();
    }

    function renderQuiz() {
      quizWrongCount = 0; // 問題ごとの間違い回数をリセット
      const question = quizQueue[currentQuizIndex];
      document.getElementById('quiz-progress').textContent = `${currentQuizIndex + 1} / ${quizQueue.length}`;
      document.getElementById('quiz-word').textContent = question.word;

      setTimeout(() => speakWord(question.word), 300);

      const options = new Set();
      options.add(question.meaning);
      while (options.size < 4) {
        options.add(globalWords[Math.floor(Math.random() * globalWords.length)].meaning);
      }
      const shuffledOptions = Array.from(options).sort(() => Math.random() - 0.5);

      const optionsContainer = document.getElementById('quiz-options');
      optionsContainer.innerHTML = '';

      shuffledOptions.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = "w-full bg-white hover:bg-blue-50 text-slate-700 font-bold py-4 px-6 rounded-xl shadow-sm border border-slate-200 transition-colors text-base sm:text-lg text-left";
        btn.textContent = opt;
        btn.onclick = () => handleQuizAnswer(opt === question.meaning, question.word, btn);
        optionsContainer.appendChild(btn);
      });
    }

    function handleQuizAnswer(isCorrect, word, clickedBtn) {
      const optionsButtons = document.querySelectorAll('#quiz-options button');
      const feedbackEl = document.getElementById('quiz-feedback');
      const iconEl = document.getElementById('feedback-icon');

      if (isCorrect) {
        // 正解の処理
        optionsButtons.forEach(b => b.disabled = true);
        clickedBtn.classList.replace('bg-white', 'bg-emerald-500');
        clickedBtn.classList.replace('text-slate-700', 'text-white');
        clickedBtn.classList.replace('border-slate-200', 'border-emerald-500');
        iconEl.textContent = '◯';
        iconEl.className = 'text-9xl font-bold drop-shadow-lg text-emerald-500';
        
        // 1発正解の場合のみ評価を昇格させる
        if (quizWrongCount === 0) {
          const progress = loadProgress();
          const current = progress[word] || 'none';
          let nextStatus = 'circle'; 
          if (current === 'cross') nextStatus = 'triangle';
          else if (current === 'triangle') nextStatus = 'circle';
          else if (current === 'circle' || current === 'double-circle') nextStatus = 'double-circle';
          saveProgress(word, nextStatus);
        }

        feedbackEl.classList.remove('opacity-0');
        setTimeout(() => {
          feedbackEl.classList.add('opacity-0');
          nextQuizQuestion();
        }, 1000);

      } else {
        // 不正解の処理
        quizWrongCount++;
        clickedBtn.disabled = true;
        
        // 1回間違えた選択肢はグレーアウトして3択に
        clickedBtn.classList.replace('bg-white', 'bg-slate-100');
        clickedBtn.classList.replace('text-slate-700', 'text-slate-400');
        
        iconEl.textContent = '×';
        iconEl.className = 'text-9xl font-bold drop-shadow-lg text-red-500';
        feedbackEl.classList.remove('opacity-0');
        
        if (quizWrongCount >= 2) {
          // 2回間違えた場合（強制終了＆正解を赤で表示）
          optionsButtons.forEach(b => b.disabled = true);
          
          const question = quizQueue[currentQuizIndex];
          optionsButtons.forEach(b => {
            if (b.textContent === question.meaning) {
              b.classList.replace('bg-white', 'bg-red-500');
              b.classList.replace('text-slate-700', 'text-white');
              b.classList.replace('border-slate-200', 'border-red-500');
            }
          });
          
          // 2回間違えたら強制的に「×」に降格
          saveProgress(word, 'cross');

          setTimeout(() => {
            feedbackEl.classList.add('opacity-0');
            setTimeout(nextQuizQuestion, 1200); // 正解を少し見せてから次へ
          }, 1000);
        } else {
          // 1回目の間違い：少し経ったら×を消して再挑戦させる
          setTimeout(() => {
            feedbackEl.classList.add('opacity-0');
          }, 600);
        }
      }
    }

    function nextQuizQuestion() {
      currentQuizIndex++;
      if (currentQuizIndex < quizQueue.length) {
        renderQuiz();
      } else {
        endQuiz();
      }
    }

    function endQuiz() {
      renderWordList();
      showScreen('list-screen');
    }

    // --- 対戦モード (VS MODE) ロジック ---
    let vsQueue = [];
    let vsCurrentIndex = 0;
    let p1Score = 0;
    let p2Score = 0;
    let vsActive = false;

    function startVsMode() {
      const partWords = getWordsForPart(currentPartIndex);
      if (partWords.length < 5) {
        alert("単語が少なすぎます。"); return;
      }
      let shuffled = [...partWords].sort(() => Math.random() - 0.5);
      vsQueue = shuffled.slice(0, 5);
      vsCurrentIndex = 0;
      p1Score = 0;
      p2Score = 0;
      
      document.getElementById('p1-score').textContent = p1Score;
      document.getElementById('p2-score').textContent = p2Score;
      
      showScreen('vs-screen');
      renderVsQuestion();
    }

    function renderVsQuestion() {
      vsActive = true;
      const question = vsQueue[vsCurrentIndex];

      const options = new Set();
      options.add(question.meaning);
      while(options.size < 4) {
          options.add(globalWords[Math.floor(Math.random() * globalWords.length)].meaning);
      }
      const shuffledOptions = Array.from(options).sort(() => Math.random() - 0.5);

      const p1Container = document.getElementById('p1-options');
      p1Container.innerHTML = '';
      shuffledOptions.forEach(opt => {
          const btn = document.createElement('button');
          btn.className = "bg-white text-blue-900 font-bold py-6 px-2 rounded-xl shadow border-2 border-blue-200 active:bg-blue-200 text-sm sm:text-base";
          btn.textContent = opt;
          btn.onclick = () => handleVsAnswer(1, opt === question.meaning, btn);
          p1Container.appendChild(btn);
      });

      const p2Container = document.getElementById('p2-options');
      p2Container.innerHTML = '';
      shuffledOptions.forEach(opt => {
          const btn = document.createElement('button');
          btn.className = "bg-white text-red-900 font-bold py-6 px-2 rounded-xl shadow border-2 border-red-200 active:bg-red-200 text-sm sm:text-base";
          btn.textContent = opt;
          btn.onclick = () => handleVsAnswer(2, opt === question.meaning, btn);
          p2Container.appendChild(btn);
      });

      setTimeout(() => speakWord(question.word), 600);
    }

    function handleVsAnswer(player, isCorrect, btn) {
      if (!vsActive) return;

      if (isCorrect) {
          vsActive = false; 
          btn.classList.replace('bg-white', 'bg-green-500');
          btn.classList.add('text-white');
          
          if (player === 1) {
            p1Score++;
            document.getElementById('p1-score').textContent = p1Score;
          } else {
            p2Score++;
            document.getElementById('p2-score').textContent = p2Score;
          }

          setTimeout(() => {
              vsCurrentIndex++;
              if (vsCurrentIndex < 5) {
                  renderVsQuestion();
              } else {
                  finishVsMode();
              }
          }, 1200);
      } else {
          btn.classList.replace('bg-white', 'bg-slate-300');
          btn.classList.add('opacity-50');
          btn.disabled = true;
      }
    }

    function finishVsMode() {
      let msg = p1Score > p2Score ? "🔵 Player 1 (下) の勝ち！" : (p2Score > p1Score ? "🔴 Player 2 (上) の勝ち！" : "🤝 引き分け！");
      alert(`試合終了！\n${msg}\n\nP1(下): ${p1Score} - P2(上): ${p2Score}`);
      endVsMode();
    }

    function endVsMode() {
      renderWordList();
      showScreen('list-screen');
    }

    initApp();

  </script>
</body>
</html>
