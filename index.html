<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>キクタンbasic 単語アプリ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    /* ◯△×ボタンの選択状態の色 */
    .status-btn.selected-circle { background-color: #3b82f6; color: white; border-color: #3b82f6; } /* Blue */
    .status-btn.selected-triangle { background-color: #eab308; color: white; border-color: #eab308; } /* Yellow */
    .status-btn.selected-cross { background-color: #ef4444; color: white; border-color: #ef4444; } /* Red */
    
    /* カスタムスクロールバー（リスト用） */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-100 flex justify-center min-h-screen font-sans text-slate-800">

  <!-- アプリのメインコンテナ -->
  <div class="bg-white w-full max-w-md shadow-xl flex flex-col relative h-screen sm:h-auto sm:min-h-[600px] sm:my-8 sm:rounded-2xl overflow-hidden">
    
    <!-- ローディング表示 -->
    <div id="loading-screen" class="absolute inset-0 bg-white z-50 flex flex-col items-center justify-center">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mb-4"></div>
      <p class="text-slate-500 font-bold">単語データを読み込み中...</p>
    </div>

    <!-- 画面1: ホーム（Part一覧）画面 -->
    <div id="home-screen" class="screen hidden flex flex-col h-full fade-in">
      <div class="bg-blue-600 text-white p-4 shadow-md z-10">
        <h1 class="text-xl font-bold text-center">キクタンbasic</h1>
        <p class="text-center text-blue-200 text-sm mt-1">学習したいPartを選んでください</p>
      </div>
      <div id="part-list" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50">
        <!-- PartリストがここにJSで生成されます -->
      </div>
    </div>

    <!-- 画面2: リスト（単語一覧）画面 -->
    <div id="list-screen" class="screen hidden flex flex-col h-full fade-in">
      <div class="bg-blue-600 text-white p-4 flex items-center justify-between shadow-md z-10">
        <button onclick="showScreen('home')" class="p-2 hover:bg-blue-700 rounded-lg transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
        </button>
        <h2 id="list-title" class="text-lg font-bold">Part X</h2>
        <div class="w-10"></div> <!-- バランス用 -->
      </div>
      
      <div class="p-4 bg-white border-b border-slate-200">
        <button id="start-quiz-btn" onclick="startQuiz()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-4 rounded-xl shadow transition-colors flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" /></svg>
          練習問題 (△/×から10問)
        </button>
      </div>

      <div id="word-list" class="flex-1 overflow-y-auto p-2 pb-20 bg-slate-50 space-y-2">
        <!-- 単語リストがここにJSで生成されます -->
      </div>
    </div>

    <!-- 画面3: クイズ（練習問題）画面 -->
    <div id="quiz-screen" class="screen hidden flex flex-col h-full fade-in bg-slate-50">
      <div class="p-4 flex items-center justify-between z-10">
        <button onclick="endQuiz()" class="text-slate-500 hover:bg-slate-200 p-2 rounded-lg font-bold text-sm transition-colors">中断</button>
        <div id="quiz-progress" class="text-slate-500 font-bold bg-white px-4 py-1 rounded-full shadow-sm text-sm">1 / 10</div>
        <div class="w-12"></div> <!-- バランス用 -->
      </div>

      <div class="flex-1 flex flex-col justify-center items-center p-6 mb-8">
        <div id="quiz-word" class="text-5xl font-extrabold text-slate-800 mb-8 text-center tracking-wide">word</div>
        
        <div id="quiz-options" class="w-full space-y-3">
          <!-- 選択肢がここにJSで生成されます -->
        </div>
      </div>
      
      <!-- クイズ結果のフィードバックオーバーレイ（正解/不正解時の丸バツ表示） -->
      <div id="quiz-feedback" class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-0 transition-opacity duration-300 z-50">
        <div id="feedback-icon" class="text-9xl font-bold drop-shadow-lg"></div>
      </div>
    </div>

  </div>

  <script>
    // ==========================================
    // GASのURL
    // ==========================================
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbz9w9cL2jmyHwWk-rHO080nb2fV11_FH_iCCv8BuM_0GPu2sfgBldIzW4GBOHWdHnBU/exec';

    const WORDS_PER_PART = 100;
    const QUIZ_COUNT = 10;
    
    let globalWords = []; // 全単語データ
    let currentPartIndex = 0; // 選択中のPart (0〜)
    let quizQueue = []; // 現在のクイズの問題配列
    let currentQuizIndex = 0; // クイズの現在の問題番号

    // ローカルストレージのキー
    const STORAGE_KEY = 'kikutan_progress';

    // アプリ初期化
    async function initApp() {
      try {
        const response = await fetch(GAS_URL);
        const data = await response.json();
        
        // GASのデータが少ない場合（テスト時など）は、1200個になるようにダミーデータを追加
        if (data.length < 100) {
           console.warn("データが少ないため、テスト用のダミーデータを生成します。");
           const dummyData = Array.from({length: 1200}, (_, i) => ({
             word: data[i % data.length]?.word + `_${i+1}` || `word_${i+1}`,
             meaning: data[i % data.length]?.meaning + `_${i+1}` || `意味_${i+1}`
           }));
           globalWords = dummyData;
        } else {
           globalWords = data;
        }
        
        renderHome();
        document.getElementById('loading-screen').classList.add('hidden');
        showScreen('home');
        
      } catch (error) {
        console.error("データの読み込みに失敗しました:", error);
        document.getElementById('loading-screen').innerHTML = `
          <div class="text-red-500 font-bold mb-2">読み込みエラー</div>
          <p class="text-slate-500 text-sm text-center px-4">GASのURLやネットワーク設定を確認してください。<br>プレビュー環境の場合はアクセス権限を確認してください。</p>
        `;
      }
    }

    // --- データ管理ロジック ---

    // 進捗（◯△×）の読み込み
    function loadProgress() {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : {};
    }

    // 進捗の保存
    function saveProgress(word, status) {
      const progress = loadProgress();
      progress[word] = status; // 状態: 'circle', 'triangle', 'cross', または 'none'(削除)
      if (status === 'none') delete progress[word];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
    }

    // 特定のPartの単語リストを取得
    function getWordsForPart(partIndex) {
      const start = partIndex * WORDS_PER_PART;
      return globalWords.slice(start, start + WORDS_PER_PART);
    }

    // --- 画面レンダリング ---

    // 画面切り替えユーティリティ
    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
      document.getElementById(screenId).classList.remove('hidden');
      
      // ホームに戻った時に進捗を再計算して表示を更新する
      if (screenId === 'home') renderHome();
    }

    // ホーム画面（Part一覧）の生成
    function renderHome() {
      const listContainer = document.getElementById('part-list');
      listContainer.innerHTML = '';
      const progressData = loadProgress();
      
      const totalParts = Math.ceil(globalWords.length / WORDS_PER_PART);

      for (let i = 0; i < totalParts; i++) {
        const partWords = getWordsForPart(i);
        if (partWords.length === 0) continue;

        // Part内の「◯」の数を計算
        let circleCount = 0;
        partWords.forEach(w => {
          if (progressData[w.word] === 'circle') circleCount++;
        });
        const percentage = Math.round((circleCount / partWords.length) * 100);

        const startNum = i * WORDS_PER_PART + 1;
        const endNum = startNum + partWords.length - 1;

        const btn = document.createElement('button');
        btn.className = "w-full bg-white p-4 rounded-xl shadow-sm border border-slate-200 hover:border-blue-400 transition-all flex items-center justify-between group";
        btn.onclick = () => openPartList(i);

        btn.innerHTML = `
          <div class="text-left">
            <h3 class="font-bold text-slate-700 text-lg group-hover:text-blue-600 transition-colors">Part ${i + 1}</h3>
            <p class="text-xs text-slate-400 mt-1">No. ${startNum} - ${endNum}</p>
          </div>
          <div class="flex items-center gap-3">
            <div class="text-right">
              <div class="text-sm font-bold ${percentage === 100 ? 'text-emerald-500' : 'text-blue-500'}">${percentage}%</div>
              <div class="text-[10px] text-slate-400">覚えた！</div>
            </div>
            <div class="w-12 h-12 rounded-full border-4 ${percentage === 100 ? 'border-emerald-500' : 'border-slate-100'} flex items-center justify-center relative overflow-hidden bg-slate-50">
              <!-- 円グラフ風の塗りつぶし (CSSのみで簡易表現) -->
              <div class="absolute bottom-0 left-0 right-0 bg-blue-500 opacity-20" style="height: ${percentage}%;"></div>
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 relative z-10 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
            </div>
          </div>
        `;
        listContainer.appendChild(btn);
      }
    }

    // リスト画面を開く
    function openPartList(partIndex) {
      currentPartIndex = partIndex;
      document.getElementById('list-title').textContent = `Part ${partIndex + 1}`;
      renderWordList();
      showScreen('list-screen');
    }

    // 単語リスト画面の生成
    function renderWordList() {
      const container = document.getElementById('word-list');
      container.innerHTML = '';
      const partWords = getWordsForPart(currentPartIndex);
      const progressData = loadProgress();

      // クイズ開始ボタンの状態更新
      const targetsForQuiz = partWords.filter(w => {
        const status = progressData[w.word];
        return status === 'triangle' || status === 'cross';
      });
      const startBtn = document.getElementById('start-quiz-btn');
      if (targetsForQuiz.length > 0) {
        startBtn.disabled = false;
        startBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" /></svg>練習問題 (${targetsForQuiz.length}問)`;
      } else {
        startBtn.disabled = true;
        startBtn.innerHTML = `練習問題 (△/×がありません)`;
      }

      partWords.forEach((wordObj, index) => {
        const currentStatus = progressData[wordObj.word] || 'none';
        
        const card = document.createElement('div');
        card.className = "bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col sm:flex-row sm:items-center justify-between gap-3";
        
        // ◯△×を切り替える関数（即時実行関数でスコープを閉じ込める）
        const setStatus = (statusStr) => {
          // 同じボタンを押したら解除（none）にする
          const newStatus = currentStatus === statusStr ? 'none' : statusStr;
          saveProgress(wordObj.word, newStatus);
          renderWordList(); // 再描画してUIを更新
        };

        // ボタンの生成ロジック
        const btnClass = "status-btn flex-1 py-2 rounded-lg border border-slate-200 font-bold text-sm flex justify-center items-center transition-colors";
        
        card.innerHTML = `
          <div class="flex-1">
            <div class="text-xs text-slate-400 mb-1">No. ${currentPartIndex * WORDS_PER_PART + index + 1}</div>
            <div class="text-lg font-bold text-slate-800">${wordObj.word}</div>
            <div class="text-sm text-slate-600">${wordObj.meaning}</div>
          </div>
          <div class="flex gap-2 sm:w-48">
            <button onclick="updateStatus('${wordObj.word.replace(/'/g, "\\'")}', 'circle')" class="${btnClass} ${currentStatus === 'circle' ? 'selected-circle' : 'text-blue-500 hover:bg-blue-50'}">◯</button>
            <button onclick="updateStatus('${wordObj.word.replace(/'/g, "\\'")}', 'triangle')" class="${btnClass} ${currentStatus === 'triangle' ? 'selected-triangle' : 'text-yellow-500 hover:bg-yellow-50'}">△</button>
            <button onclick="updateStatus('${wordObj.word.replace(/'/g, "\\'")}', 'cross')" class="${btnClass} ${currentStatus === 'cross' ? 'selected-cross' : 'text-red-500 hover:bg-red-50'}">×</button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // グローバルから呼べるステータス更新関数
    function updateStatus(word, newStatus) {
      const progress = loadProgress();
      const current = progress[word] || 'none';
      const finalStatus = current === newStatus ? 'none' : newStatus;
      saveProgress(word, finalStatus);
      renderWordList(); // リストを再描画
    }


    // --- クイズ（練習問題）ロジック ---

    function startQuiz() {
      const partWords = getWordsForPart(currentPartIndex);
      const progressData = loadProgress();
      
      // △か×の単語を抽出
      let targets = partWords.filter(w => {
        const status = progressData[w.word];
        return status === 'triangle' || status === 'cross';
      });

      if (targets.length === 0) return;

      // ランダムにシャッフルして最大10問取り出す
      targets.sort(() => Math.random() - 0.5);
      quizQueue = targets.slice(0, QUIZ_COUNT);
      currentQuizIndex = 0;

      showScreen('quiz-screen');
      renderQuiz();
    }

    function renderQuiz() {
      const question = quizQueue[currentQuizIndex];
      document.getElementById('quiz-progress').textContent = `${currentQuizIndex + 1} / ${quizQueue.length}`;
      document.getElementById('quiz-word').textContent = question.word;

      // 選択肢の生成（正解1つ + 不正解3つ）
      const options = new Set();
      options.add(question.meaning); // 正解を追加

      // 不正解を全単語からランダムに選ぶ
      while (options.size < 4) {
        const randomWord = globalWords[Math.floor(Math.random() * globalWords.length)];
        options.add(randomWord.meaning);
      }

      // 選択肢をシャッフル
      const shuffledOptions = Array.from(options).sort(() => Math.random() - 0.5);

      const optionsContainer = document.getElementById('quiz-options');
      optionsContainer.innerHTML = '';

      shuffledOptions.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = "w-full bg-white hover:bg-blue-50 text-slate-700 font-bold py-4 px-6 rounded-xl shadow-sm border border-slate-200 transition-colors text-lg text-left";
        btn.textContent = opt;
        
        btn.onclick = () => handleQuizAnswer(opt === question.meaning, question.word, btn);
        optionsContainer.appendChild(btn);
      });
    }

    // 回答を処理する
    function handleQuizAnswer(isCorrect, word, clickedBtn) {
      // 連続クリック防止
      const buttons = document.querySelectorAll('#quiz-options button');
      buttons.forEach(b => b.disabled = true);

      const feedbackEl = document.getElementById('quiz-feedback');
      const iconEl = document.getElementById('feedback-icon');

      if (isCorrect) {
        // 正解の処理
        clickedBtn.classList.replace('bg-white', 'bg-emerald-500');
        clickedBtn.classList.replace('text-slate-700', 'text-white');
        clickedBtn.classList.replace('border-slate-200', 'border-emerald-500');
        
        iconEl.textContent = '◯';
        iconEl.className = 'text-9xl font-bold drop-shadow-lg text-emerald-500';
        
        // リストのチェックを「◯」に更新！
        saveProgress(word, 'circle');
      } else {
        // 不正解の処理
        clickedBtn.classList.replace('bg-white', 'bg-red-500');
        clickedBtn.classList.replace('text-slate-700', 'text-white');
        clickedBtn.classList.replace('border-slate-200', 'border-red-500');
        
        iconEl.textContent = '×';
        iconEl.className = 'text-9xl font-bold drop-shadow-lg text-red-500';
      }

      // フィードバックアニメーション表示
      feedbackEl.classList.remove('opacity-0');
      
      // 1秒後に次の問題へ
      setTimeout(() => {
        feedbackEl.classList.add('opacity-0');
        currentQuizIndex++;
        
        if (currentQuizIndex < quizQueue.length) {
          renderQuiz();
        } else {
          endQuiz(true);
        }
      }, 1000);
    }

    // クイズを終了してリストに戻る
    function endQuiz(completed = false) {
      if (completed) {
        // 完了通知
        const toast = document.createElement('div');
        toast.className = 'fixed top-4 left-1/2 transform -translate-x-1/2 bg-emerald-600 text-white px-6 py-3 rounded-full shadow-lg fade-in z-50 text-sm font-bold';
        toast.textContent = '練習問題クリア！リストに戻ります。';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      }
      
      renderWordList(); // 更新された◯△×を反映するため再描画
      showScreen('list-screen');
    }

    // アプリ起動
    initApp();

  </script>
</body>
</html>
